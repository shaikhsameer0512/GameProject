<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whack-a-Mole Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
}

.container{
text-align:center;
}

h1{
margin-bottom:10px;
}

.score{
font-size:20px;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,120px);
gap:15px;
justify-content:center;
}

.hole{
width:120px;
height:120px;
background:#333;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:40px;
}

.hole.active{
background:#ffcc00;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#ff4757;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#e84118;
}
</style>

</head>

<body>

<div class="container">

<h1>🎯 Whack-a-Mole</h1>

<div class="score">
Score: <span id="score">0</span>
</div>

<div class="grid" id="grid">

<div class="hole"></div>
<div class="hole"></div>
<div class="hole"></div>
<div class="hole"></div>
<div class="hole"></div>
<div class="hole"></div>
<div class="hole"></div>
<div class="hole"></div>
<div class="hole"></div>

</div>

<button onclick="startGame()">Start Game</button>

</div>

<script src="script.js"></script>

</body>
</html>
